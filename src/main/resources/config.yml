# ─────────────────────────────────────────────
#  KKopia Configuration
# ─────────────────────────────────────────────

database:
  host: "localhost"
  port: 3306
  name: "kcrp_main"
  user: "root"
  password: "password"
  # Table d'économie de kconomy
  economy-table: "kconomy_wallets"
  # Nom de la colonne
  economy-column: "balance"
  # Pool size for HikariCP
  pool-size: 10

economy:
  # Tax percentage deducted when a player launders K-Crypto (0.0 – 100.0)
  launderer-tax-rate: 5.0
  # Minimum possible rate (1 KCrypto → X KCoins). Prevents division quirks.
  rate-floor: 0.01
  # Base rate when total circulation is 0 (bootstrap value)
  # Formula: Rate = base-rate / (1 + C × rate-decay-constant)
  # Ex: base-rate=3.0 → 1 KCrypto = 3 KCoins max (quand personne n'a miné)
  base-rate: 3.0
  # Constante de décroissance du taux. Plus elle est élevée, plus le krach est brutal.
  # Valeur par défaut: 0.0004
  # Ex: C=5000 → Rate = 3.0 / (1 + 5000 × 0.0004) = 1.0 KCoin par KCrypto
  rate-decay-constant: 0.0004

machine:
  # Seconds between each ore-consumption tick per machine
  tick-interval-seconds: 30
  # Seconds the machine stays in overload (cooldown) – default 1800 = 30 min
  overload-cooldown-seconds: 1800
  # Heat points reduced per tick when the machine has no ores (passive cooling)
  passive-cooling-rate: 2.0
  # Rarity skip multiplier: determines how many extra ticks a rare ore takes to mine.
  # Formula: skips = yield * multiplier
  # Example with multiplier 4: Diamond (yield 2.5) takes 10 extra ticks to mine. Coal (yield 0.05) takes 0 extra ticks.
  rarity-skip-multiplier: 4

messages:
  prefix: "&8[&6KKopia&8] &r"
  no-permission: "&cVous n'avez pas la permission d'effectuer cette action."
  launderer-denied: "&7Cet individu ne souhaite pas vous parler."
