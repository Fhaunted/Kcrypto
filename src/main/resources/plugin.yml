name: Kcrypto
version: '1.0.0'
main: com.kcrp.kcrypto.KcryptoPlugin
api-version: '1.21'
folia-supported: true
description: Folia crypto-economy plugin for KCRP.
authors: [KCRP]


commands:
  kcrypto:
    description: Admin commands for Kcrypto.
    usage: /kcrypto <add|remove|admin>
    permission: kcrypto.admin
  crypto:
    description: Player commands for Kcrypto.
    usage: /crypto <wallet|pay|withdraw>
    permission: kcrypto.member

permissions:
  kcrypto.admin:
    description: Full administrative access.
    default: op
  kcrypto.member:
    description: Basic member access (wallet, miner).
    default: true
  Kcrypto.blanchisseur:
    description: Access to the Launderer NPC and /kcrypto withdraw.
    default: false
